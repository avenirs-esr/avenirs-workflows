name: Check US completion (reusable)

on:
  workflow_call:
    inputs:
      issue_node_id:
        required: true
        type: string
        description: "GraphQL node_id of the CLOSED child issue"
    secrets:
      GH_TOKEN:
        required: true
      GH_APP_ID:
        required: true
      GH_APP_TOKEN:
        required: true
    outputs:
      should_run:
        description: "true if parent is User Story AND all its sub-issues are closed"
        value: ${{ jobs.check.outputs.should_run }}

permissions:
  issues: read
  contents: read
  repository-projects: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check_us.outputs.should_run }}

    steps:
      - name: 👮‍♂️ Check if parent US is complete
        id: check_us
        uses: avenirs-esr/avenirs-workflows/.github/actions/check-us-done@main
        with:
          token: ${{ secrets.GH_TOKEN }}
          issue_node_id: ${{ inputs.issue_node_id }}

  update-us-status:
    needs: check
    if: ${{ needs.check.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      repository-projects: write
      issues: write
      contents: read

    steps:
      - name: 🔐 Create GitHub App token
        id: app
        uses: avenirs-esr/avenirs-workflows/.github/actions/github-app-token@main
        with:
          app_id: ${{ secrets.GH_APP_ID }}
          app_private_key: ${{ secrets.GH_APP_TOKEN }}
          owner: ${{ vars.ORG }}

      - name: 🔍 Resolve parent US
        id: parent
        uses: avenirs-esr/avenirs-workflows/.github/actions/resolve-parent-issue@main
        with:
          token: ${{ steps.app.outputs.app-token }}
          issue_node_id: ${{ inputs.issue_node_id }}

      - name: 🧭 Move US to In Review in Project
        if: ${{ success() }}
        uses: avenirs-esr/avenirs-workflows/.github/actions/issue-status-update@main
        with:
          token: ${{ steps.app.outputs.app-token }}
          issue_node_id: ${{ steps.parent.outputs.parent_issue_node_id }}
          project_number: ${{ vars.COFOLIO_PROJECT_NUMBER }}
          target_status_name: ${{ vars.IN_REVIEW_STATUS_NAME }}
