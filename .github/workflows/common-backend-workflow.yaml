name: Common Backend Workflow

on:
  workflow_call:
    inputs:
      run_lint:
        type: boolean
        default: true
      run_security_scan:
        type: boolean
        default: true
      run_unit_tests:
        type: boolean
        default: true
      run_integration_tests:
        type: boolean
        default: true
      page_title:
        type: string
        default: "${{ github.event.repository.name }} - Documentation"
      lint_fail_on_error:
        type: boolean
        default: true
      security_fail_on_critical:
        type: boolean
        default: true

  workflow_dispatch:
    inputs:
      run_lint:
        description: 'Run Linting?'
        type: boolean
        default: true
      run_security_scan:
        description: 'Run Security Scan?'
        type: boolean
        default: true
      run_unit_tests:
        description: 'Run Unit Tests?'
        type: boolean
        default: true
      run_integration_tests:
        description: 'Run Integration Tests?'
        type: boolean
        default: true
      page_title:
        description: 'Documentation Page Title'
        type: string
        default: "Documentation"
      lint_fail_on_error:
        description: 'Fail on Lint Error?'
        type: boolean
        default: true
      security_fail_on_critical:
        description: 'Fail on Critical Security Issues?'
        type: boolean
        default: true

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.head_ref }}
          submodules: recursive
      - name: 📤 Upload Templates
        uses: avenirs-esr/avenirs-workflows/.github/actions/upload-templates@main

  lint:
    if: ${{ inputs.run_lint }}
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.head_ref }}
          submodules: recursive
      - name: 🔎 Lint code
        uses: avenirs-esr/avenirs-workflows/.github/actions/linting-scan@main
        with:
          fail_if_unformatted: ${{ inputs.lint_fail_on_error }}
      - name: 📦 Save Linting Report
        if: ${{ hashFiles('lint/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: lint

  security_scan:
    if: ${{ inputs.run_security_scan }}
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.head_ref }}
          submodules: recursive
      - name: 🔒 Security scan
        uses: avenirs-esr/avenirs-workflows/.github/actions/security-scan@main
        with:
          fail_on_critical: ${{ inputs.security_fail_on_critical }}
      - name: 📦 Save Security Report
        if: ${{ hashFiles('dependency-check-report/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: dependency-check-report

  test_coverage:
    if: ${{ inputs.run_unit_tests }}
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.head_ref }}
          submodules: recursive
      - name: ⬆️ Grant execution permissions for Maven Wrapper
        run: chmod +x ./mvnw
      - name: 🧪 Run tests and generate coverage report
        uses: avenirs-esr/avenirs-workflows/.github/actions/tests-and-code-coverage@main
        env:
          JASYPT_ENCRYPTOR_PASSWORD: ${{ secrets.JASYPT_ENCRYPTOR_PASSWORD }}
        with:
          ignore_ssl_verification: "true"
          import_certificate_from_localhost: "false"
          run_integration_tests: ${{ inputs.run_integration_tests }}
      - name: 📦 Save JaCoCo Report
        if: ${{ hashFiles('jacoco-report/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: jacoco-report

  publish_to_gh_pages:
    if: ${{ inputs.run_lint || inputs.run_security_scan || inputs.run_unit_tests }}
    runs-on: ubuntu-latest
    needs: [ setup, lint, security_scan, test_coverage ]
    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.head_ref }}
          submodules: recursive
      - name: 📥 Download Security Report
        if: ${{ inputs.run_security_scan }}
        uses: actions/download-artifact@v4
        with:
          name: security-report
          path: dependency-check-report
      - name: 📥 Download Linting Report
        if: ${{ inputs.run_lint }}
        uses: actions/download-artifact@v4
        with:
          name: lint-report
          path: lint
      - name: 📥 Download JaCoCo Report
        if: ${{ inputs.run_unit_tests }}
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: jacoco-report
      - name: 📦 Publish reports to GitHub Pages
        uses: avenirs-esr/avenirs-workflows/.github/actions/publish-to-gh-pages@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages
          page_title: ${{ inputs.page_title }}
