name: Release new version to npm

on:
  workflow_call:

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref_name == 'main' || github.ref_name == 'develop'
    outputs:
      released_version: ${{ steps.released-version.outputs.released_version }}
    steps:
      - name: 🔑 Generate GitHub App token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.DSAV_GH_APP_ID }}
          private_key: ${{ secrets.DSAV_GH_APP_PRIVATE_KEY }}

      - name: 🚀 Notify Rocket.Chat for incoming deployment
        uses: avenirs-esr/avenirs-workflows/.github/actions/rocket-chat-notify@main
        with:
          api-url: ${{ secrets.ROCKETCHAT_API_URL }}
          auth-token: ${{ secrets.ROCKETCHAT_TOKEN }}
          user-id: ${{ secrets.ROCKETCHAT_USER_ID }}
          channel: ${{ vars.ROCKET_CHAT_NOTIFICATION_CANAL }}
          message: |
            ${{
              format('🚀 【BOT】 Publication npm en cours...')
            }}

      - name: ⬇️ Checkout repo with App token
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: 🔧 Setup Node + install
        uses: avenirs-esr/avenirs-workflows/.github/actions/setup-node@main

      - name: 🖊️ Configure Git user
        run: |
          git config --global user.name  "avenirs-dsav-bot[bot]"
          git config --global user.email "avenirs-dsav-bot[bot]@users.noreply.github.com"

      - name: 🚀 Run release
        run: npm run release:${{ github.event.inputs.bump }}

      - name: 🏷️ Resolve released version
        id: released-version
        run: |
          echo "released_version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: ⬆️ Push tags and commits
        env:
          GIT_TOKEN: ${{ secrets.DSAV_BOT_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GIT_TOKEN}@github.com/${{ github.repository }}
          git push origin HEAD --follow-tags

  notify:
    name: 🚀 Notify Rocket.Chat
    needs: [ release ]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 🚀 Send Rocket.Chat notification
        uses: avenirs-esr/avenirs-workflows/.github/actions/rocket-chat-notify@main
        with:
          api-url: ${{ secrets.ROCKETCHAT_API_URL }}
          auth-token: ${{ secrets.ROCKETCHAT_TOKEN }}
          user-id: ${{ secrets.ROCKETCHAT_USER_ID }}
          channel: ${{ vars.ROCKET_CHAT_NOTIFICATION_CANAL }}
          message: |
            ${{
              needs.release.result == 'success' &&
              format('✅ 【BOT】 Publication npm réussie (v{0})', needs.release.outputs.released_version) ||

              needs.release.result == 'cancelled' &&
              format('⚠️ 【BOT】 Publication npm annulée (version cible: v{0})', needs.release.outputs.released_version || 'inconnue') ||

              format('❌ 【BOT】 Publication npm échouée (version cible: v{0})', needs.release.outputs.released_version || 'inconnue')
            }}
            ${{
              needs.release.result != 'success' &&
              format('🔎 Run: {0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) ||
              ''
            }}
