name: Autodeploy to npm (no need to run it)

on:
  workflow_call:

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  publish-to-npm:
    runs-on: ubuntu-latest
    outputs:
      published_version: ${{ steps.published-version.outputs.published_version }}
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Verify tag is on develop
        run: |
          TAG_REF=${GITHUB_REF#refs/tags/}
          COMMIT=$(git rev-list -n 1 "$TAG_REF")
          echo "Tag $TAG_REF points to commit $COMMIT"

          BRANCHES=$(git branch -r --contains $COMMIT | grep 'origin/develop' || true)
          if [ -z "$BRANCHES" ]; then
            echo "❌ Tag $TAG_REF is not on develop, skipping publish."
            exit 1
          fi

          echo "✅ Tag $TAG_REF is on develop"

      - name: 🔧 Setup Node + install
        uses: avenirs-esr/avenirs-workflows/.github/actions/setup-node@main

      - name: 🏗️ Build project
        run: npm run build-only

      - name: 🧪 Run checks in parallel (typecheck + lint + build)
        shell: bash
        run: |
          set -euo pipefail
          (npm run type-check) & pid1=$!
          (npm run lint)       & pid2=$!
          (npm run build)      & pid3=$!
          code=0
          for p in $pid1 $pid2 $pid3; do
            if ! wait "$p"; then code=1; fi
          done
          exit $code

      - name: 🚀 Publish to npm
        run: npm publish --provenance

      - name: 🏷️ Resolve published version
        id: published-version
        run: |
          version=$(node -e 'console.log(require("./package.json").version)')
          echo "published_version=$version" >> "$GITHUB_OUTPUT"

  notify:
    name: 🚀 Notify Rocket.Chat
    needs: [ publish-to-npm ]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 🚀 Send Rocket.Chat notification
        uses: avenirs-esr/avenirs-workflows/.github/actions/rocket-chat-notify@main
        with:
          api-url: ${{ secrets.ROCKETCHAT_API_URL }}
          auth-token: ${{ secrets.ROCKETCHAT_TOKEN }}
          user-id: ${{ secrets.ROCKETCHAT_USER_ID }}
          channel: ${{ vars.ROCKET_CHAT_NOTIFICATION_CANAL }}
          message: |
            ${{
              needs.publish-to-npm.result == 'success' &&
              format('✅ 【BOT】 Publication du DSAV sur npm réussie (v{0})', needs.publish-to-npm.outputs.published_version) ||

              needs.publish-to-npm.result == 'cancelled' &&
              format('⚠️ 【BOT】 Publication du DSAV sur npm annulée') ||

              format('❌ 【BOT】 Publication du DSAV sur npm échouée')
            }}
            ${{
              needs.publish-to-npm.result != 'success' &&
              format('🔎 Run: {0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) ||
              ''
            }}
