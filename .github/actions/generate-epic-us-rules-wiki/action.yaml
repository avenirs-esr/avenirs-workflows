name: "Generate Epic/US/Rules Wiki Report"
description: "Generate Wiki markdown report from project items JSON"
inputs:
  json_file:
    description: "Input JSON file with project items"
    required: false
    default: "project-items.json"
  output_file:
    description: "Output markdown file"
    required: false
    default: "epic-us-rules-report.md"
  mode:
    required: false
    type: string
    description: "Mode: 'full' (all epics, stories and rules), 'no-rules' (all epics and stories, no rules), 'items-with-rules' (only items with rules)"
    default: "full"

runs:
  using: "composite"
  steps:
    - name: 📝 Generate Epic/US/Rules Wiki Markdown
      shell: bash
      env:
        JSON_FILE: ${{ inputs.json_file }}
        OUTPUT_FILE: ${{ inputs.output_file }}
        MODE: ${{ inputs.mode }}
      run: node "$GITHUB_ACTION_PATH/generate-epic-us-rules-wiki.js"
