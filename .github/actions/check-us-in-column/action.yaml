name: "Should run if US in column"
description: "Returns should_run=true if there is at least one User Story issue in the given Project V2 column (single-select field)."

inputs:
  token:
    required: true
    description: "GitHub token (PAT or GitHub App token recommended) with access to org Project V2"
  project_number:
    required: true
    description: "Project V2 number (not id), (e.g. 16 for Cofolio project)"
  target_status_name:
    required: false
    default: "In Review"
    description: "Target column name (e.g. 'In Review')"
  org:
    required: false
    default: "avenirs-esr"
    description: "GitHub organization name (default: avenirs-esr)"
  issue_type:
    required: false
    default: "User Story"
    description: "Issue type to look for in the column (default: 'User Story')"

outputs:
  should_run:
    description: "true if at least one US is found in the target column"
    value: ${{ steps.run.outputs.should_run }}

runs:
  using: "composite"
  steps:
    - name: 🔧 Set up Node.js 22 and install dependencies
      uses: avenirs-esr/avenirs-workflows/.github/actions/setup-node@main
      with:
        run-npm-command: "false"

    - name: 🔍 Check Project V2 column for US
      id: run
      shell: bash
      env:
        TOKEN: ${{ inputs.token }}
        ORG: ${{ inputs.org }}
        PROJECT_NUMBER: ${{ inputs.project_number }}
        TARGET_STATUS_NAME: ${{ inputs.target_status_name }}
        US_ISSUE_TYPE: ${{ inputs.issue_type }}
      run: node "$GITHUB_ACTION_PATH/check-us-in-column.js"
