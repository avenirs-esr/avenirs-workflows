name: "Resolve parent issue"
description: "Given an issue node_id, returns its parent issue node_id if it exists (sub-issue), otherwise returns empty."

inputs:
  token:
    required: true
    description: "GitHub token (GITHUB_TOKEN or GitHub App installation token)"
  issue_node_id:
    required: true
    description: "GraphQL node_id of the issue (child or any issue)"

outputs:
  parent_issue_node_id:
    description: "GraphQL node_id of the parent issue, empty if no parent"
    value: ${{ steps.run.outputs.parent_issue_node_id }}
  resolved_issue_node_id:
    description: "GraphQL node_id of the issue that should be acted on (parent if exists, else the provided issue)"
    value: ${{ steps.run.outputs.resolved_issue_node_id }}
  parent_issue_number:
    description: "Parent issue number (for commenting), empty if no parent"
    value: ${{ steps.run.outputs.parent_issue_number }}

runs:
  using: "composite"
  steps:
    - name: 🔧 Set up Node.js 22 and install dependencies
      uses: avenirs-esr/avenirs-workflows/.github/actions/setup-node@main
      with:
        run-npm-command: "false"

    - name: 🔎 Resolve parent
      id: run
      shell: bash
      env:
        TOKEN: ${{ inputs.token }}
        ISSUE_NODE_ID: ${{ inputs.issue_node_id }}
      run: node "$GITHUB_ACTION_PATH/resolve-parent-issue.js"
